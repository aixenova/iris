<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Submit Data</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="hero">
        <p class="eyebrow">Prescription Submit Capture</p>
        <h1>Saved Patients</h1>
        <p id="status" class="status">Waiting for the first captured submit...</p>
      </div>
      <section class="card">
        <div class="meta" id="meta"></div>
        <p id="emptyState" class="empty-state">
          Click the submit button on the target page and the patient list will appear here.
        </p>
        <ol class="entry-list" id="entryList"></ol>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
